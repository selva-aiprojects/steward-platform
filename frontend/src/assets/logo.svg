<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2A4D"/>
      <stop offset="100%" stop-color="#06182C"/>
    </linearGradient>
    <linearGradient id="greenPulse" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="cyanPulse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer Hexagonal / Shield Container -->
  <path d="M 256 32 L 440 138 L 440 350 L 256 480 L 72 350 L 72 138 Z" fill="url(#shieldGrad)" stroke="url(#greenPulse)" stroke-width="16" stroke-linejoin="round"/>
  <path d="M 256 52 L 420 148 L 420 340 L 256 456 L 92 340 L 92 148 Z" fill="none" stroke="#1E40AF" stroke-width="3" opacity="0.3"/>

  <!-- Candlestick Wicks / Grid Background Elements -->
  <line x1="180" y1="120" x2="180" y2="390" stroke="#10B981" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
  <line x1="256" y1="100" x2="256" y2="410" stroke="#38BDF8" stroke-width="8" stroke-linecap="round" opacity="0.25"/>
  <line x1="332" y1="120" x2="332" y2="390" stroke="#10B981" stroke-width="8" stroke-linecap="round" opacity="0.25"/>

  <!-- Stylized Geometric 'S' (StockSteward Trend Line) -->
  <path d="M 340 165 C 340 125, 270 120, 220 120 C 160 120, 140 160, 140 195 C 140 250, 372 235, 372 315 C 372 365, 310 395, 256 395 C 190 395, 140 365, 140 325" 
        fill="none" stroke="url(#greenPulse)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- AI Pulse Star / Node at Top Right of Trend -->
  <circle cx="340" cy="165" r="18" fill="url(#cyanPulse)" filter="url(#glow)"/>
  <circle cx="340" cy="165" r="8" fill="#FFFFFF"/>

  <!-- Ascending Bull Candle Bars inside S curve -->
  <rect x="164" y="240" width="32" height="70" rx="8" fill="#10B981" opacity="0.9"/>
  <rect x="240" y="190" width="32" height="110" rx="8" fill="#38BDF8" opacity="0.9"/>
  <rect x="316" y="220" width="32" height="80" rx="8" fill="#34D399" opacity="0.9"/>
</svg>